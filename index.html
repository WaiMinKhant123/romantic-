<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Eternal Love Story ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Myanmar Unicode & Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&family=Pyidaungsu&display=swap');

        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --glass: rgba(255, 255, 255, 0.82);
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Montserrat', 'Pyidaungsu', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Falling Sakura Background */
        .petal {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) translateX(100px) rotate(720deg); }
        }

        /* Interactive Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(var(--dx) - 50%), calc(var(--dy) - 50%)) scale(0); opacity: 0; }
        }

        /* Luxury Glass Card */
        .luxury-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 2.5rem 2rem;
            border-radius: 3rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 85%;
            max-width: 360px;
            z-index: 10;
        }

        /* Holo Border Container */
.img-wrapper {
    position: relative;
    width: 170px; /* ဓာတ်ပုံထက် နည်းနည်းပိုကြီးရမယ် */
    height: 170px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; /* အပြင်ထွက်နေတဲ့ gradient တွေကို ဖျောက်ဖို့ */
    margin-bottom: 2rem;
    box-shadow: 0 0 25px rgba(255, 77, 109, 0.4);
}

/* လည်နေမည့် Holo Background */
.img-wrapper::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    /* Romantic Holo Colors (Pink, Purple, Blue, Gold) */
    background: conic-gradient(
        #ff4d6d, #ffccd5, #c77dff, #7fb3d5, #ff4d6d
    );
    animation: rotateHolo 4s linear infinite;
    z-index: 1;
}

/* ဓာတ်ပုံကို Holo ပေါ်မှာ တင်ထားခြင်း */
.profile-img {
    width: 155px;
    height: 155px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid white; /* ဓာတ်ပုံဘေးက အဖြူရောင် border လေး */
    position: relative;
    z-index: 2; /* Gradient ရဲ့ အပေါ်မှာ ရှိနေဖို့ */
    background: white;
}

/* Rotation Animation */
@keyframes rotateHolo {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 3rem;
            margin: 10px 0;
        }

        #typewriter-text {
            font-size: 1.1rem;
            color: #4a4a4a;
            min-height: 70px;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 500;
        }

        /* New Pretty Music Player Design */
        .player-bar {
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .play-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: all 0.3s ease;
        }

        .play-btn:active { transform: scale(0.9); }

        .song-info {
            flex-grow: 1;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            letter-spacing: 0.5px;
        }

        #bg-music { display: none; }
    </style>
</head>
<body onclick="createExplosion(event)" ontouchstart="createExplosion(event)">

    <div class="luxury-card animate__animated animate__fadeInUp">
        <div class="img-wrapper">
            <img src="IMG_20260326_222001_972.jpg" class="profile-img animate__animated animate__pulse animate__infinite animate__slow" alt="Our Memory">
        </div>

        <h1>Forever Yours</h1>

        <div id="typewriter-text"></div>

        <div class="player-bar">
            <button class="play-btn" onclick="toggleMusic()" id="mBtn">▶</button>
            <div class="song-info">Zennith - Lullbaby ❤️</div>
        </div>
        
        <audio id="bg-music" loop>
    <source src="music.m4a" type="audio/mp4">
        </audio>
    </div>

    <script>
        // ၁။ Myanmar Typewriter Text Generator
        const messages = [
            "မင်းရဲ့ အပြုံးလေးတွေက ငါ့အတွက်တော့ ကြယ်လေးတွေထက် ပိုလှတယ်... ✨",
            "ငါ့ဘဝရဲ့ အကောင်းဆုံးသော ဆုလာဘ်က မင်းလေးနဲ့ ဆုံတွေ့ခွင့်ရတာပါပဲ... ❤️",
            "နှလုံးခုန်သံ တိုင်းမှာ မင်းကို ချစ်တဲ့ အချစ်တွေ ပိုတိုးလာတယ်... 💖",
            "စကားလုံးတွေနဲ့ ဖော်ပြလို့ မရအောင် မင်းကို အများကြီး ချစ်တယ်... 🌹"
        ];
        
        let mIdx = 0, cIdx = 0, isDeleting = false;

        function type() {
            const display = document.getElementById("typewriter-text");
            const currentMessage = messages[mIdx];

            if (!isDeleting) {
                display.innerHTML = currentMessage.substring(0, cIdx + 1);
                cIdx++;
                if (cIdx === currentMessage.length) {
                    isDeleting = true;
                    setTimeout(type, 2500); // ပြီးရင် ခဏရပ်မယ်
                } else {
                    setTimeout(type, 100);
                }
            } else {
                display.innerHTML = currentMessage.substring(0, cIdx - 1);
                cIdx--;
                if (cIdx === 0) {
                    isDeleting = false;
                    mIdx = (mIdx + 1) % messages.length;
                    setTimeout(type, 500);
                } else {
                    setTimeout(type, 50);
                }
            }
        }

        // ၂။ Touch/Click Explosion Effects
        function createExplosion(e) {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            const items = ['❤️', '🌸', '✨', '💖', '💍']; 
            
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = items[Math.floor(Math.random() * items.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.fontSize = Math.random() * 20 + 15 + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 350 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 350 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        // ၃။ Music Control
        let isPlaying = false;
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('mBtn');
            if(!isPlaying) {
                music.play();
                btn.innerHTML = "⏸";
                isPlaying = true;
            } else {
                music.pause();
                btn.innerHTML = "▶";
                isPlaying = false;
            }
        }

        // ၄။ Background Sakura Fall Effect
        setInterval(() => {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 20 + 10 + 'px';
            petal.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }, 800);

        window.onload = type;
    </script>
</body>
</html>
