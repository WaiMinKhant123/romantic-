<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Eternal Love Story ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Myanmar Unicode & Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&family=Pyidaungsu&display=swap');

        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --glass: rgba(255, 255, 255, 0.3); /* Glassmorphism အတွက် opacity လျှော့ထားပါတယ် */
            
            /* Pastel Colors for BG Changer */
            --pastel-1: #FFB6C1; 
            --pastel-2: #E6E6FA;
            --pastel-3: #FFDAB9;
            --pastel-4: #E0FFFF;
            --pastel-5: #FFF0F5;
        }

        /* 1. Dynamic Pastel Background Changer */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', 'Pyidaungsu', sans-serif;
            overflow: hidden;
            touch-action: none;
            position: relative;
            
            /* Animation for smooth background transition */
            animation: changePastelBG 20s infinite alternate linear;
            transition: background-color 3s ease-in-out;
        }

        @keyframes changePastelBG {
            0%   { background-color: var(--pastel-1); }
            25%  { background-color: var(--pastel-2); }
            50%  { background-color: var(--pastel-3); }
            75%  { background-color: var(--pastel-4); }
            100% { background-color: var(--pastel-5); }
        }

        /* Falling Sakura Background */
        .petal {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) translateX(100px) rotate(720deg); }
        }

        /* Interactive Particles (Enhanced) */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 1s cubic-bezier(0, 0.9, 0.6, 1) forwards;
            z-index: 100;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(var(--dx) - 50%), calc(var(--dy) - 50%)) scale(0); opacity: 0; }
        }

        /* Luxury Glass Card */
        .luxury-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 2.5rem 2rem;
            border-radius: 3.5rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 85%;
            max-width: 360px;
            z-index: 10;
            transition: transform 0.3s ease;
        }
        
        .luxury-card:hover { transform: translateY(-10px); }

        /* Holo Border Container */
        .img-wrapper {
            position: relative;
            width: 175px;
            height: 175px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0 auto 2rem;
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.4);
        }

        .img-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(#ff4d6d, #ffccd5, #c77dff, #7fb3d5, #ff4d6d);
            animation: rotateHolo 4s linear infinite;
            z-index: 1;
        }

        /* Profile Image (File location မပြောင်းလဲပါ) */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            position: relative;
            z-index: 2;
            background: white;
        }

        @keyframes rotateHolo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: white; /* Pastel BG ပေါ်မှာ ပိုလင်းအောင် အဖြူရောင်ပြောင်းထားပါတယ် */
            font-size: 3rem;
            margin: 10px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #typewriter-text {
            font-size: 1.1rem;
            color: #444;
            min-height: 70px;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Music Player Design */
        .player-bar {
            background: rgba(255, 255, 255, 0.4);
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .play-btn {
            background: white;
            color: var(--primary);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .play-btn:active { transform: scale(0.9); }

        .song-info {
            flex-grow: 1;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            letter-spacing: 0.5px;
        }

        #bg-music { display: none; }
    </style>
</head>
<body onclick="createExplosion(event)" ontouchstart="createExplosion(event)">

    <div class="luxury-card animate__animated animate__fadeInUp">
        <div class="img-wrapper">
            <img src="IMG_20260326_222001_972.jpg" class="profile-img animate__animated animate__pulse animate__infinite animate__slow" alt="Our Memory">
        </div>

        <h1>Forever Yours</h1>

        <div id="typewriter-text"></div>

        <div class="player-bar">
            <button class="play-btn" onclick="toggleMusic()" id="mBtn">▶</button>
            <div class="song-info">Zennith - Lullbaby ❤️</div>
        </div>
        
        <audio id="bg-music" loop>
            <source src="music.m4a" type="audio/mp4">
        </audio>
    </div>

    <script>
        // ၁။ Myanmar Typewriter Text (စာသားများကို နဂိုအတိုင်းထားပေးပါသည်)
        const messages = [
            "မင်းရဲ့ အပြုံးလေးတွေက သိပ်လှတာပဲ... ✨",
            "နတ်သက်ကြွေလာတဲ့ နတ်သမီး လေးအလားပါပဲ... ❤️",
            "အင်းလေးသူမင်းလေးတစ်ယောက်ရဲ့ နှလုံးသားတံခါးကိုခေါက်... 💖",
            "စကားလုံးတွေနဲ့ ဖော်ပြလို့ မရအောင် မင်းကို အများကြီး ချစ်တယ်... 🌹"
        ];
        
        let mIdx = 0, cIdx = 0, isDeleting = false;

        function type() {
            const display = document.getElementById("typewriter-text");
            const currentMessage = messages[mIdx];

            if (!isDeleting) {
                display.innerHTML = currentMessage.substring(0, cIdx + 1);
                cIdx++;
                if (cIdx === currentMessage.length) {
                    isDeleting = true;
                    setTimeout(type, 2500);
                } else {
                    setTimeout(type, 100);
                }
            } else {
                display.innerHTML = currentMessage.substring(0, cIdx - 1);
                cIdx--;
                if (cIdx === 0) {
                    isDeleting = false;
                    mIdx = (mIdx + 1) % messages.length;
                    setTimeout(type, 500);
                } else {
                    setTimeout(type, 50);
                }
            }
        }

        // ၂။ Enhanced Touch/Click Explosion Effects
        function createExplosion(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const items = ['❤️', '🌸', '✨', '💖', '💍', '💎', '🌹']; 
            
            for (let i = 0; i < 18; i++) { // အရေအတွက် ပိုတိုးထားပါတယ်
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = items[Math.floor(Math.random() * items.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.fontSize = Math.random() * 25 + 15 + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 500 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 500 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // ၃။ Music Control
        let isPlaying = false;
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('mBtn');
            if(!isPlaying) {
                music.play().catch(() => {});
                btn.innerHTML = "⏸";
                isPlaying = true;
            } else {
                music.pause();
                btn.innerHTML = "▶";
                isPlaying = false;
            }
        }

        // ၄။ Background Sakura Fall Effect (More dense)
        setInterval(() => {
            const petal = document.createElement('div');
            const icons = ['🌸', '✨', '💮'];
            petal.className = 'petal';
            petal.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = Math.random() * 20 + 10 + 'px';
            petal.style.opacity = Math.random() * 0.8 + 0.2;
            petal.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 8000);
        }, 300); // Sakura ထွက်နှုန်းကို ပိုမြန်စေပါတယ်

        window.onload = type;
    </script>
</body>
</html>
